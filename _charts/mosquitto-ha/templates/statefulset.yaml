apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
spec:
  serviceName: {{ .Release.Name }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
        mqtt-role: passive
    spec:
      serviceAccountName: {{ .Release.Name }}
      {{- if .Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      {{- end }}
      containers:
        - name: mosquitto
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/scripts/entrypoint.sh"]
          ports:
            - name: mqtt
              containerPort: {{ .Values.service.mqttPort }}
            {{- if .Values.tls.enabled }}
            - name: mqtts
              containerPort: {{ .Values.tls.port }}
            {{- end }}
            {{- if .Values.mtls.enabled }}
            - name: mqtt-mtls
              containerPort: {{ .Values.mtls.port }}
            {{- end }}
          env:
            - name: REDIS_HOST
              value: {{ .Values.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: REDIS_USERNAME
              value: {{ .Values.redis.username | quote }}
            - name: REDIS_PASSWORD
              value: {{ .Values.redis.password | quote }}
            - name: REDIS_PASSWORD_FILE
              value: {{ .Values.redis.passwordFile | quote }}
            - name: LEADER_KEY
              value: {{ .Values.redis.leaderKey | quote }}
            - name: LEADER_TTL_MS
              value: {{ .Values.redis.leaderTtlMs | quote }}
            - name: RETAIN_PREFIX
              value: {{ .Values.redis.retainPrefix | quote }}
            - name: AUTH_ENABLED
              value: {{ .Values.auth.enabled | quote }}
            - name: AUTH_USERNAME
              value: {{ .Values.auth.username | quote }}
            - name: AUTH_PASSWORD_FILE
              value: {{ .Values.auth.passwordFile | quote }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: conf
              mountPath: /mosquitto/config
            {{- if .Values.auth.enabled }}
            - name: auth
              mountPath: /mosquitto/auth
            {{- end }}
            {{- if .Values.extraVolumeMounts }}
            {{- toYaml .Values.extraVolumeMounts | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # No liveness/readiness probe on the MQTT port: passive replicas never
          # open it at all (by design — see entrypoint.sh), so a TCP probe would
          # mark them permanently unhealthy and get them restarted in a loop.
          # Routing correctness comes from the Service selecting on the
          # `mqtt-role=active` label (set by entrypoint.sh), not from probes.
      volumes:
        - name: scripts
          configMap:
            name: {{ .Release.Name }}-scripts
            defaultMode: 0755
        - name: conf
          configMap:
            name: {{ .Release.Name }}-conf
        {{- if .Values.auth.enabled }}
        - name: auth
          emptyDir: {}
        {{- end }}
        {{- if .Values.extraVolumes }}
        {{- toYaml .Values.extraVolumes | nindent 8 }}
        {{- end }}
